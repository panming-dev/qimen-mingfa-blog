name: Deploy Hugo to Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hugo
        run: npm install -g hugo-extended

      - name: Debug
        run: |
          echo "baseURL: $(grep '^baseURL' hugo.toml)"
          echo "Theme: $(grep '^theme' hugo.toml)"
          echo "Custom header: $(test -f layouts/partials/header.html && echo YES || echo NO)"
          ls -la layouts/partials/ 2>/dev/null || echo "No partials dir"

      - name: Build
        run: hugo --minify

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: List Public Directory
        run: |
          echo "=== Public directory structure ==="
          find public -type f | head -30
          echo "=== Assets exist? ==="
          ls -la public/assets/ 2>/dev/null || echo "assets/ not found"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: List Public
        run: ls -la public/ && echo "---" && find public -name "*.html" | head -5
      - name: Debug Head Output
        run: |
          echo "=== HEAD ==="
          sed -n '/<head>/,/<\/head>/p' public/index.html | head -30
