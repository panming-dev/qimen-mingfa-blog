name: Deploy Hugo to Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
    # Allow manual trigger
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Hugo
        run: npm install -g hugo-extended
      - name: Debug Hugo Config
        run: |
          echo "=== hugo.toml ==="
          cat hugo.toml
          echo "=== Theme layouts ==="
          find themes/PaperMod/layouts -type f | sort
          echo "=== Custom layouts ==="
          find layouts -type f | sort
          echo "=== Header override exists? ==="
          ls -la layouts/partials/header.html 2>/dev/null || echo "No custom header"
          echo "=== Hugo Version ==="
          hugo version
          echo "=== Hugo Config Dump ==="
          hugo config
      - name: Build
        run: hugo --minify --theme PaperMod --noCache
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
