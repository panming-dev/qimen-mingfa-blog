name: Deploy Hugo site to Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hugo
        run: |
          npm install -g hugo-extended@0.160.1
          hugo version

      - name: Show config
        run: |
          echo "=== hugo.toml ==="
          cat hugo.toml | head -30
          echo ""
          echo "=== Menus ==="
          grep -A10 'menu' hugo.toml || true

      - name: Clean cache
        run: rm -rf resources/_gen/ public/

      - name: Build site
        run: |
          set -x
          hugo --minify --ignoreCache --logLevel debug --printPathWarnings

      - name: Debug generated head
        run: |
          echo "=== index.html head ==="
          if [ -f public/index.html ]; then
            sed -n '/<head>/,/<\/head>/p' public/index.html | head -20
          else
            echo "index.html not found"
            find public -name "*.html" | head -5
          fi
          echo ""
          echo "=== post head ==="
          if [ -f public/posts/basics/index.html ]; then
            sed -n '/<head>/,/<\/head>/p' public/posts/basics/index.html | head -20
          else
            echo "post not found"
          fi

      - name: Check output
        run: |
          echo "=== Public structure ==="
          find public -type f | sort
          echo ""
          echo "=== Head of index.html ==="
          head -50 public/index.html
          echo ""
          echo "=== Head of article ==="
          head -50 public/posts/basics/$(ls public/posts/basics/ 2>/dev/null | head -1) 2>/dev/null || echo "No article file"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
