name: Deploy Hugo to Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  cancel-in-progress: false
  group: "pages"

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hugo
        run: npm install -g hugo-extended

      - name: Debug Config
        run: |
          echo "baseURL: $(grep '^baseURL' hugo.toml)"
          echo "Theme: $(grep '^theme' hugo.toml)"
          echo "Menus:"
          grep -A10 '\[menu' hugo.toml || true

      - name: Build
        run: hugo --minify

      - name: List Taxonomy Pages
        run: |
          echo "=== Taxonomy pages ==="
          find public -type f -name "*categories*" -o -name "*tags*" 2>/dev/null
          echo ""
          echo "=== Section dirs ==="
          find public -type d | head -20

      - name: Debug Public Assets
        run: |
          echo "=== Public structure ==="
          find public -type f | sort
          echo ""
          echo "=== Assets directory ==="
          ls -la public/assets/ 2>/dev/null || echo "assets/ NOT found"
          ls -la public/assets/css/ 2>/dev/null || echo "assets/css NOT found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          timeout: 60s
        if: always()
        run: |
          echo "=== Deploy completed ==="

        with:
          timeout: 60s
