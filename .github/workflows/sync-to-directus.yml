name: Sync to Directus
on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug - List files
        run: |
          pwd
          ls -la
          ls -la .hermes-sync/scripts/ 2>/dev/null || echo "No scripts dir"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}/.hermes-sync

      - name: Sync Posts to Directus
        env:
          DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
          DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
        run: node scripts/sync.js
        working-directory: ${{ github.workspace }}/.hermes-sync
