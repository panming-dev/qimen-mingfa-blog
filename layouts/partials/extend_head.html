{{- /* Dual-mode layout banner styles */ -}}
{{- if and hugo.IsProduction (not .IsHome) }}
<style>
  .canonical-banner {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    text-align: center;
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    border-radius: 4px;
  }
  .canonical-banner a {
    color: #fff;
    text-decoration: underline;
    font-weight: bold;
  }
</style>
{{- end }}
