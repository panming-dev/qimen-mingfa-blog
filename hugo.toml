baseURL = 'https://panming-dev.github.io/qimen-mingfa-blog/'
languageCode = 'zh-cn'
title = '奇门鸣法·磐鸣'
theme = 'PaperMod'

# URL 生成策略：文章使用 filename (01-xxx.html) 并强制 .html 后缀
[permalinks]
  posts = "/posts/:slug/"

[params]
  disableInlineCSS = true
  customCSS = ["https://cdn.jsdelivr.net/gh/adityatelange/hugo-PaperMod@master/static/css/papermod.css"]
  disableAssets = false
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowShareButtons = true
  ShowReadingTime = true
  ShowWordCount = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 3
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 4

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

canonifyURLs = true

[assets]
  disableHLJS = true
