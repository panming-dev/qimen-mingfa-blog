<p>奇门遁甲鸣法诠释</p>
<p>郑序</p>
<p>余习《易》廿五载矣，习奇门遁甲已逾二十年矣，得习《奇门鸣法》三年余。纵观《鸣法》、《枢要》、《衍象》三书，乃是迄今为止世传奇门书籍所不能超越者之经典。何也？一者体系完备，二者传承完善，三是道出惊世害闻之奇门要理。是书之现世，于研习奇门者言，无疑是一大幸事。余不多赘，观之自明也哉！</p>
<p>关外山人郑殿咸于林海雪原壬辰年辛亥月戊戌日壬子时于灯下</p>
<p>奇门遁甲鸣法上卷</p>
<p>辽东 龙伏山人撰</p>
